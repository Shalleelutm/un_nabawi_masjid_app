name: un_nabawi_masjid_app_clean
description: Local mosque application for Un Nabawi Masjid
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  shared_preferences: ^2.2.3
  sqflite: ^2.3.0
  path: ^1.8.0
  uuid: ^4.4.0
  audioplayers: ^6.0.0
  confetti: ^0.7.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  intl: ^0.18.1
  hijri_calendar: ^1.0.0
  url_launcher: ^6.2.0
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  google_sign_in: ^6.1.0
  image_picker: ^1.0.7
  firebase_storage: ^11.6.0
  lottie: ^3.0.0
  animations: ^2.0.7
  simple_animations: ^5.0.0
  flutter_staggered_animations: ^1.1.0
  animated_text_kit: ^4.2.2
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  flip_card: ^0.7.0
  liquid_swipe: ^3.1.0
  simple_ripple_animation: ^0.0.9
  just_audio: ^0.9.36
  audio_waveforms: ^1.0.4
  particles_flutter: ^1.0.0
  local_auth: ^2.1.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/prayer_times.json
    - assets/quran_sample.json
    - assets/ramadan_hadith.json
    - assets/audio/
    - assets/images/
    - assets/quran/
    - assets/quran/surah/

