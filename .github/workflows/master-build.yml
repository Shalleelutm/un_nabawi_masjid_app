name: 🔥 MASTER BUILD - WOW Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: 📦 Install Dependencies
      run: |
        flutter clean
        flutter pub get
    
    - name: 🔍 Verify Assets
      run: |
        echo "✅ Checking prayer_times.json..."
        test -f assets/prayer_times.json && echo "✅ Found" || exit 1
        echo "✅ Checking Quran surahs..."
        ls assets/quran/surah/ | wc -l
        echo "✅ All assets verified!"
    
    - name: 🔐 Setup Firebase Config
      run: |
        echo '${{ secrets.FIREBASE_TOKEN }}' > android/app/google-services.json
        echo '${{ secrets.FIREBASE_TOKEN }}' > firebase_service_account.json
    
    - name: 📝 Generate Code
      run: |
        flutter pub run build_runner build --delete-conflicting-outputs || true
    
    - name: 🧪 Run Tests
      run: flutter test || echo "No tests yet"
    
    - name: 🔨 Build Release APK
      run: flutter build apk --release
    
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: masjid-app-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30
    
    - name: 🎉 Success Notification
      run: |
        echo "✅ BUILD SUCCESSFUL!"
        echo "📱 APK Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"